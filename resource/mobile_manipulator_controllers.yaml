controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Joint State Broadcaster
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Arm controller
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Gripper controller
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Arm Controller Configuration
arm_controller:
  ros__parameters:
    joints:
      - arm_joint_1
      - arm_joint_2
      - arm_joint_3
      - arm_joint_4
      - arm_joint_5
      - arm_joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      arm_joint_1:
        trajectory: 0.05
        goal: 0.02
      arm_joint_2:
        trajectory: 0.05
        goal: 0.02
      arm_joint_3:
        trajectory: 0.05
        goal: 0.02
      arm_joint_4:
        trajectory: 0.05
        goal: 0.02
      arm_joint_5:
        trajectory: 0.05
        goal: 0.02
      arm_joint_6:
        trajectory: 0.05
        goal: 0.02

# Gripper Controller Configuration
gripper_controller:
  ros__parameters:
    joints:
      - gripper_left_joint
      - gripper_right_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 2.0
      gripper_left_joint:
        trajectory: 0.02
        goal: 0.01
      gripper_right_joint:
        trajectory: 0.02
        goal: 0.01